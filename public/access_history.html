<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Historique d'Accès - Administration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4ADE80",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; }
        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-in { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-out { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .status-declined { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/access_control.html'" class="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl transition-all font-bold text-sm">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                Retour au Live
            </button>
            <div class="h-8 w-px bg-slate-200"></div>
            <h1 class="text-xl font-black text-slate-900 tracking-tight">Historique des Accès</h1>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-10">
        <!-- Search & Filter Card -->
        <div class="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm mb-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Rechercher</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                        <input type="text" id="searchQuery" oninput="loadHistory()" placeholder="Nom, RFID, ID..." class="w-full pl-10 rounded-xl border-slate-200 focus:border-primary focus:ring-primary/20 text-sm font-bold">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Date</label>
                    <input type="date" id="searchDate" onchange="loadHistory()" class="w-full rounded-xl border-slate-200 focus:border-primary focus:ring-primary/20 text-sm font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Action</label>
                    <select id="searchAction" onchange="loadHistory()" class="w-full rounded-xl border-slate-200 focus:border-primary focus:ring-primary/20 text-sm font-bold">
                        <option value="">Tous</option>
                        <option value="IN">Entrées</option>
                        <option value="OUT">Sorties</option>
                        <option value="DECLINED">Refus</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Results Table -->
        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Date & Heure</th>
                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Lecteur</th>
                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">RFID</th>
                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Action</th>
                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Détails / Raison</th>
                    </tr>
                </thead>
                <tbody id="historyBody" class="divide-y divide-slate-100">
                    <!-- Rows loaded here -->
                </tbody>
            </table>
            <div id="noResults" class="hidden py-20 flex flex-col items-center justify-center text-slate-300 gap-4">
                <span class="material-symbols-outlined text-[64px]">search_off</span>
                <p class="font-bold">Aucun résultat trouvé pour cette recherche</p>
            </div>
        </div>
    </main>

    <script>
        async function loadHistory() {
            const query = document.getElementById('searchQuery').value;
            const date = document.getElementById('searchDate').value;
            const action = document.getElementById('searchAction').value;
            
            let url = '/api/admin/access/logs?detailed=true';
            if (query) url += `&query=${encodeURIComponent(query)}`;
            if (date) url += `&date=${date}`;
            if (action) url += `&action=${action}`;
            
            const res = await fetch(url.startsWith('/') ? '/admin' + url : url);
            const logs = await res.json();
            renderLogs(logs);
        }

        function renderLogs(logs) {
            const body = document.getElementById('historyBody');
            const noResults = document.getElementById('noResults');
            body.innerHTML = '';
            
            if (logs.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            logs.forEach(log => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                const date = new Date(log.SCAN_DATE).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                let statusClass = 'status-declined';
                if (log.ACTION === 'IN') statusClass = 'status-in';
                if (log.ACTION === 'OUT') statusClass = 'status-out';

                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <p class="text-sm font-bold text-slate-900">${date}</p>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-100 overflow-hidden">
                                ${log.LEC_PHOTO ? `<img src="${log.LEC_PHOTO}" class="w-full h-full object-cover">` : `<span class="material-symbols-outlined text-slate-300 text-sm flex items-center justify-center h-full">person</span>`}
                            </div>
                            <p class="text-sm font-bold text-slate-700">${log.LEC_NOM} ${log.LEC_PRENOM}</p>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-mono font-bold text-slate-400">${log.RFID_CODE || '---'}</span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="status-badge ${statusClass}">${log.ACTION}</span>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-xs font-bold text-red-500 uppercase">${log.REASON || '---'}</p>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        // Default load
        loadHistory();
    </script>
</body>
</html>
