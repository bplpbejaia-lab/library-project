# =========================================================================
# Nginx Configuration Template for Library Project Deployment
# Place this file or merge its contents into /etc/nginx/sites-available/default
# or /etc/nginx/conf.d/library.conf on your remote server.
# =========================================================================

# -------------------------------------------------------------------------
# OPTION 1: SUBDOMAIN METHOD (Recommended)
# Host the new library app on a subdomain (e.g., library.yourdomain.dz)
# while the old site continues to run on the main domain (yourdomain.dz).
# -------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    
    # Replace library.yourdomain.dz with your actual subdomain or domain
    server_name library.yourdomain.dz;

    # Redirect all HTTP traffic to HTTPS (uncomment when SSL certificate is installed)
    # return 301 https://$host$request_uri;

    # Max upload size (important for book image uploads or PDF files)
    client_max_body_size 50M;

    # Reverse proxy for Fastify Backend (running on port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Highly optimized direct serving of static assets by Nginx
    # Replace /var/www/Library_Project with the actual path on your server
    location /css/ {
        alias /var/www/Library_Project/css/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /js/ {
        alias /var/www/Library_Project/js/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /images/ {
        alias /var/www/Library_Project/images/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /fonts/ {
        alias /var/www/Library_Project/fonts/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Logging config
    access_log /var/log/nginx/library_access.log;
    error_log /var/log/nginx/library_error.log;
}


